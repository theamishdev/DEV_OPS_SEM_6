name: Java CI Build with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java JDK 17 required for the project
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches dependency downloads

      # Step 3 & 4: Install dependencies, compile application and run tests
      - name: Build and Test with Maven
        run: mvn -B clean package

      # Step 5: Archive the generated JAR artifact for future use
      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: my-maven-app-jar
          path: target/*.jar
